name: Build Binaries

on:
  push:
    tags:
      - 'v*'   # Dispara ao criar uma tag ex: v1.0.0
  workflow_dispatch:   # Permite rodar manualmente pelo GitHub

jobs:
  build-mac:
    name: Build macOS (.app)
    runs-on: macos-14   # Apple Silicon (M1)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: |
          pip install torch torchvision torchaudio
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller build.spec

      - name: Zip .app
        run: |
          cd dist
          zip -r VideoTranscriber-mac.zip VideoTranscriber.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTranscriber-mac
          path: dist/VideoTranscriber-mac.zip

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Install dependencies
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu121
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: pyinstaller build.spec

      - name: Zip output
        run: |
          cd dist
          Compress-Archive -Path VideoTranscriber -DestinationPath VideoTranscriber-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTranscriber-windows
          path: dist/VideoTranscriber-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: VideoTranscriber-mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VideoTranscriber-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VideoTranscriber-mac.zip
            VideoTranscriber-windows.zip
          generate_release_notes: true
